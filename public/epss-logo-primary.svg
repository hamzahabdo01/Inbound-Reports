<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <!-- 
    EPSS Interlocking Monogram
    Color: #0B4F54 (Solid Primary Brand Tint)
  -->
  <g fill="none" stroke="#0B4F54" stroke-width="42" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- Top/Middle Segment Loop (E / Upper S) -->
    <path d="M 305,60 
             L 210,60 
             A 65,65 0 0,0 210,190 
             L 305,190" />
             
    <!-- Middle Parallel Prong -->
    <path d="M 210,125 
             L 305,125" />
    
    <!-- Right/Bottom Segment Loop (P / Lower S) -->
    <path d="M 305,125 
             A 65,65 0 0,1 305,255 
             L 210,255" />
             
    <!-- Vertical Straight Stem -->
    <path d="M 210,210 
             L 210,340" />
             
  </g>
</svg>
