<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <!-- 
    EPSS Interlocking Watermark from image_8ac39b.jpg
    Adjust the global opacity below to make it more or less subtle.
  -->
  <g fill="none" stroke-width="42" stroke-linecap="round" stroke-linejoin="round" opacity="0.08">
    
    <!-- Red Top/Middle Segment (E / Upper S) -->
    <!-- Consists of the upper loop and the middle parallel prong -->
    <path d="M 305,60 
             L 210,60 
             A 65,65 0 0,0 210,190 
             L 305,190" 
          stroke="#B9252C" />
          
    <path d="M 210,125 
             L 305,125" 
          stroke="#B9252C" />
    
    <!-- Blue Right/Bottom Segment (P / Lower S) -->
    <!-- Seamlessly locks into the middle tier, loops right, and drops into the vertical stem -->
    <path d="M 305,125 
             A 65,65 0 0,1 305,255 
             L 210,255" 
          stroke="#1976D2" />
          
    <path d="M 210,210 
             L 210,340" 
          stroke="#1976D2" />
          
  </g>
</svg>
